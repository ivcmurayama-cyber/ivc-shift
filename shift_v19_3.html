<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:#f5f5f5;color:#1a1a1a;overflow:hidden}
:root{--bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;--txt:#1a1a1a;--txt2:#666;--bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.2);--r:8px;--rl:12px;--red:#E24B4A;--blue:#185FA5;--green:#1D9E75}
.mode-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:500px;gap:20px;padding:40px;background:var(--bg2)}
.mode-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.mode-btn{border:1px solid var(--bd2);border-radius:var(--rl);padding:20px 28px;cursor:pointer;background:var(--bg);text-align:center;min-width:130px}
.mode-btn:active{opacity:.7}
.mode-btn .icon{font-size:26px;margin-bottom:8px}
.mode-btn .label{font-size:14px;font-weight:600;color:var(--txt)}
.mode-btn .desc{font-size:11px;color:var(--txt2);margin-top:3px}
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:500px;gap:14px;background:var(--bg2)}
.pin-title{font-size:17px;font-weight:600;color:var(--txt)}
.pin-sub{font-size:12px;color:var(--txt2)}
.pin-display{display:flex;gap:12px;margin:8px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--bd2);transition:background .15s}
.pin-dot.filled{background:var(--txt);border-color:var(--txt)}
.pin-pad{display:grid;grid-template-columns:repeat(3,68px);gap:10px}
.pin-key{width:68px;height:68px;border:1px solid var(--bd);border-radius:50%;font-size:20px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--txt);display:flex;align-items:center;justify-content:center}
.pin-key:active{background:var(--bg3)}
.pin-error{font-size:12px;color:var(--red);min-height:16px}
.back-link{font-size:12px;color:var(--txt2);cursor:pointer;text-decoration:underline;margin-top:6px;padding:6px}
.app{display:flex;flex-direction:column;height:600px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--bd);background:var(--bg2);flex-shrink:0}
.app-title{font-size:13px;font-weight:600;color:var(--txt)}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hbtn{font-size:11px;color:var(--txt2);cursor:pointer;border:1px solid var(--bd);border-radius:var(--r);padding:4px 10px;background:var(--bg)}
.hbtn:active{background:var(--bg3)}
.hbtn-pin{font-size:11px;color:var(--txt);cursor:pointer;border:1px solid var(--bd2);border-radius:var(--r);padding:4px 10px;background:var(--bg);font-weight:600}
.hbtn-pin:active{background:var(--bg3)}
.hbtn-confirm{font-size:11px;color:#fff;cursor:pointer;border:none;border-radius:var(--r);padding:4px 12px;background:var(--green);font-weight:600}
.hbtn-confirm:active{opacity:.8}
.hbtn-unconfirm{font-size:11px;color:#fff;cursor:pointer;border:none;border-radius:var(--r);padding:4px 12px;background:#888;font-weight:600}
.hbtn-unconfirm:active{opacity:.8}
.hbtn-export{font-size:11px;color:#fff;cursor:pointer;border:none;border-radius:var(--r);padding:4px 10px;background:#7B4F2E;font-weight:600}
.hbtn-export:active{opacity:.8}
.tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg2);overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 11px;font-size:11px;cursor:pointer;color:var(--txt2);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--txt);border-bottom-color:var(--txt);font-weight:600}
.content{flex:1;overflow:hidden;position:relative;min-height:0}
.panel{display:none;height:100%;overflow:auto}
.panel.active{display:block}
.shift-wrap{overflow:auto;height:100%}
table.shift{border-collapse:collapse;font-size:11px;white-space:nowrap}
table.shift th,table.shift td{border:.5px solid var(--bd);padding:0}
table.shift th{background:var(--bg2);font-weight:600;text-align:center;color:var(--txt2);font-size:10px;position:sticky;top:0;z-index:3}
table.shift th.sc1{position:sticky;left:0;z-index:4;background:var(--bg2)}
table.shift td.sc1{position:sticky;left:0;background:var(--bg);z-index:2}
table.shift td.sc2{position:sticky;left:82px;background:var(--bg);z-index:2}
table.shift th.sc2{position:sticky;left:82px;z-index:4;background:var(--bg2)}
.th-date{padding:3px 4px;min-width:68px}.th-name{min-width:82px;text-align:left;padding:3px 6px}.th-wage{min-width:44px;padding:3px 4px}
.td-name{padding:5px 6px;font-size:11px;color:var(--txt);min-width:82px}.td-wage{padding:5px 4px;font-size:10px;color:var(--txt2);text-align:right;min-width:44px}
.td-shift{min-width:68px;text-align:center;vertical-align:middle;cursor:pointer;height:36px}
.td-shift:active{background:var(--bg2)}
.shift-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1px;padding:2px}
.ct{font-size:10px;font-weight:600;color:var(--blue);line-height:1.2}
.wt{font-size:9px;color:#854F0B;line-height:1.2}
.td-off{color:var(--txt2);font-size:10px}
.td-off-wish{cursor:pointer}
.td-off-label{color:var(--txt2);font-size:11px;font-weight:400}

.td-total{padding:3px 5px;font-size:10px;font-weight:600;text-align:right;background:var(--bg2)}.th-total{padding:3px 5px;min-width:48px}
.group-row td{background:#F1EFE8!important;font-size:10px;font-weight:600;color:#5F5E5A;padding:2px 6px}
.c-red{color:var(--red)!important}.c-blue{color:var(--blue)!important}
.edit-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:10}
.edit-overlay.open{display:flex}
.edit-box{background:var(--bg);border-radius:var(--rl);border:1px solid var(--bd);padding:18px;width:min(270px,90%)}
.edit-box h3{font-size:14px;font-weight:600;margin-bottom:6px;color:var(--txt)}
.edit-wish-info{font-size:11px;color:#854F0B;background:#FAEEDA;border-radius:6px;padding:5px 8px;margin-bottom:10px;display:none}
.edit-global-err{font-size:11px;color:var(--red);background:#FCEBEB;border-radius:6px;padding:5px 8px;margin-bottom:8px;display:none}
.edit-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.edit-row label{font-size:12px;color:var(--txt2);min-width:30px}
.edit-row input{border:1px solid var(--bd2);border-radius:var(--r);padding:7px 10px;font-size:16px;width:110px;color:var(--txt);background:var(--bg)}
.edit-row input.err{border-color:var(--red);background:#FCEBEB}
.field-err{font-size:10px;color:var(--red);margin-bottom:6px;min-height:14px;padding-left:38px}
.edit-acts{display:flex;gap:6px;margin-top:10px}
.btn-save{background:var(--txt);color:var(--bg);border:none;border-radius:var(--r);padding:9px 14px;font-size:13px;cursor:pointer;flex:1;font-weight:600}
.btn-save:active{opacity:.8}
.btn-off{background:none;border:1px solid var(--bd2);border-radius:var(--r);padding:9px 10px;font-size:12px;cursor:pointer;color:var(--txt2)}
.btn-cancel{background:none;border:1px solid var(--bd);border-radius:var(--r);padding:9px 10px;font-size:12px;cursor:pointer;color:var(--txt2)}
.date-picker-row{display:flex;gap:5px;flex-wrap:wrap;padding:8px 12px;border-bottom:1px solid var(--bd);overflow-x:auto}
.date-picker-row::-webkit-scrollbar{display:none}
.date-chip{padding:4px 8px;border:1px solid var(--bd);border-radius:16px;font-size:10px;cursor:pointer;background:var(--bg);white-space:nowrap;flex-shrink:0;text-align:center;line-height:1.4}
.date-chip:active{background:var(--bg3)}
.date-chip.active{background:var(--txt);color:#fff!important;border-color:var(--txt)}
.chip-hname{font-size:8px;display:block;line-height:1}
.daily-summary{display:flex;gap:12px;padding:9px 14px;border-bottom:1px solid var(--bd);background:var(--bg2);align-items:center;flex-wrap:wrap}
.dsumcard .dval{font-size:15px;font-weight:600;color:var(--txt)}.dsumcard .dlbl{font-size:10px;color:var(--txt2)}
.daily-tl-body{overflow:auto;padding:10px 14px 16px;flex:1}
.tl-hours-row{display:flex;margin-left:120px;margin-bottom:5px}
.tl-hour{font-size:10px;color:var(--txt2);flex-shrink:0;text-align:left}
.tl-row{display:flex;align-items:center;margin-bottom:5px;min-height:34px;margin-top:16px}
.tl-name-wrap{width:120px;flex-shrink:0;padding-right:8px;display:flex;flex-direction:column}
.tl-name{font-size:11px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-wish-sub{font-size:9px;color:#854F0B;line-height:1.3}
.tl-conf-sub{font-size:9px;color:var(--blue);font-weight:600;line-height:1.3}
.tl-track{flex:1;position:relative;height:24px;background:var(--bg3);border-radius:4px;cursor:pointer;overflow:visible}
.tl-track:active{opacity:.8}
.tl-bar{position:absolute;top:0;height:100%;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;overflow:hidden;white-space:nowrap}
.tl-bar-c{background:#B5D4F4;color:var(--blue)}.tl-bar-w{background:#FAEEDA;color:#854F0B}
.tl-now-line{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--red);z-index:2;pointer-events:none}
.tl-now-label{position:absolute;top:-14px;font-size:9px;color:var(--red);transform:translateX(-50%);white-space:nowrap}
.tl-group-label{font-size:10px;font-weight:600;color:#5F5E5A;background:#F1EFE8;padding:3px 8px;margin:8px 0 4px;border-radius:3px;position:relative;z-index:5}
.off-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)}
.legend-item{display:flex;align-items:center;gap:5px}.legend-dot{width:10px;height:10px;border-radius:2px}
.hc-section{margin-top:14px;padding-top:12px;border-top:1px solid var(--bd)}
.hc-title{font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.hc-legend{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--txt2);font-weight:400}
.hc-legend-swatch{width:8px;height:8px;border-radius:2px}
.hc-wrap{display:flex;margin-left:0}
.hc-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0}
.hc-diff{font-size:9px;font-weight:700;text-align:center;min-height:13px;line-height:13px}
.hc-num{font-size:9px;color:var(--txt2);text-align:center;line-height:1.2}
.hc-hr{font-size:9px;color:var(--txt2);text-align:center}
.daily-edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end;justify-content:center;z-index:20}
.daily-edit-overlay.open{display:flex}
.daily-edit-box{background:var(--bg);border-radius:var(--rl) var(--rl) 0 0;padding:22px;width:100%;max-width:480px}
.daily-edit-box h3{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:14px}
.wish-display-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 12px;background:var(--bg2);border-radius:var(--r)}
.wish-display-row .wd-label{font-size:11px;color:var(--txt2);min-width:60px;flex-shrink:0}
.wish-display-row .wd-val{font-size:15px;font-weight:600;color:#854F0B}
.wish-display-row .wd-none{font-size:12px;color:var(--txt2)}
.de-divider{font-size:11px;color:var(--txt2);margin-bottom:10px}
.de-global-err{font-size:11px;color:var(--red);background:#FCEBEB;border-radius:6px;padding:7px 10px;margin-bottom:10px;display:none}
.de-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.de-row label{font-size:13px;color:var(--txt2);min-width:36px}
.de-row input{border:1px solid var(--bd2);border-radius:var(--r);padding:9px 12px;font-size:17px;width:120px;color:var(--txt);background:var(--bg);text-align:center}
.de-row input.err{border-color:var(--red);background:#FCEBEB}
.de-field-err{font-size:11px;color:var(--red);margin-bottom:8px;min-height:14px;padding-left:46px}
.de-acts{display:flex;gap:8px;margin-top:14px}
.de-btn-save{background:var(--txt);color:var(--bg);border:none;border-radius:var(--r);padding:11px 16px;font-size:14px;cursor:pointer;flex:1;font-weight:600}
.de-btn-save:active{opacity:.8}
.de-btn-off{background:none;border:1px solid var(--bd2);border-radius:var(--r);padding:11px 12px;font-size:12px;cursor:pointer;color:var(--txt2)}
.de-btn-cancel{background:none;border:1px solid var(--bd);border-radius:var(--r);padding:11px 12px;font-size:12px;cursor:pointer;color:var(--txt2)}
.staff-mgmt{padding:14px;overflow:auto;height:100%}
.staff-mgmt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.staff-mgmt-header h3{font-size:13px;font-weight:600;color:var(--txt)}
.group-section{margin-bottom:18px}
.group-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.group-title{font-size:11px;font-weight:600;color:#5F5E5A;background:#F1EFE8;padding:3px 10px;border-radius:3px}
.add-group-member{font-size:12px;color:var(--txt2);cursor:pointer;border:none;background:none;text-decoration:underline;padding:4px}
table.staff-tbl{width:100%;border-collapse:collapse;font-size:12px}
table.staff-tbl th{padding:6px 8px;font-size:11px;font-weight:600;color:var(--txt2);border-bottom:1px solid var(--bd);text-align:left}
table.staff-tbl td{padding:5px 4px;border-bottom:1px solid var(--bd)}
table.staff-tbl tr:last-child td{border-bottom:none}
table.staff-tbl input{border:1px solid var(--bd2);border-radius:5px;padding:5px 7px;font-size:13px;color:var(--txt);background:var(--bg);width:100%}
table.staff-tbl input.err{border-color:var(--red);background:#FCEBEB}
.del-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--txt2);padding:3px 7px;border-radius:5px}
.del-btn:active{background:var(--bg3);color:var(--red)}
.setting-panel{padding:14px;overflow:auto;height:100%}
.setting-title{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:12px}
.setting-day-tabs{display:flex;gap:8px;margin-bottom:14px}
.setting-day-tab{padding:6px 16px;border:1px solid var(--bd2);border-radius:20px;font-size:12px;cursor:pointer;background:var(--bg);color:var(--txt2)}
.setting-day-tab.active{background:var(--txt);color:var(--bg);border-color:var(--txt)}
.setting-day-tab:active{opacity:.8}
.req-rows{display:flex;flex-direction:column;gap:6px}
.req-row{display:grid;grid-template-columns:90px 1fr;gap:8px;align-items:center}
.req-time-lbl{font-size:11px;color:var(--txt2)}
.req-inp-wrap{display:flex;align-items:center;gap:4px}
.req-inp{width:52px;border:1px solid var(--bd2);border-radius:5px;padding:5px 6px;font-size:14px;text-align:center;color:var(--txt);background:var(--bg)}
.req-unit{font-size:10px;color:var(--txt2)}
.req-save-btn{margin-top:14px;background:var(--txt);color:var(--bg);border:none;border-radius:var(--r);padding:10px 22px;font-size:13px;cursor:pointer;font-weight:600}
.req-save-btn:active{opacity:.8}
.tmpl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:30}
.tmpl-overlay.open{display:flex}
.tmpl-box{background:var(--bg);border-radius:var(--rl);border:1px solid var(--bd);padding:20px;width:min(260px,90%)}
.tmpl-box h3{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:4px}
.tmpl-box-sub{font-size:11px;color:var(--txt2);margin-bottom:14px}
.tmpl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tmpl-row label{font-size:12px;color:var(--txt2);min-width:36px}
.tmpl-row input{border:1px solid var(--bd2);border-radius:var(--r);padding:8px 10px;font-size:16px;width:110px;color:var(--txt);background:var(--bg);text-align:center}
.tmpl-err{font-size:11px;color:var(--red);min-height:14px;margin-bottom:4px}
.tmpl-acts{display:flex;gap:8px;margin-top:10px}
.tmpl-save-btn{background:var(--txt);color:var(--bg);border:none;border-radius:var(--r);padding:10px 14px;font-size:14px;cursor:pointer;flex:1;font-weight:600}
.tmpl-cancel-btn{background:none;border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;font-size:13px;cursor:pointer;color:var(--txt2)}
.wish-app-header{padding:11px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.wish-period-nav{display:flex;align-items:center;gap:6px}
.wish-period-nav button{background:none;border:1px solid var(--bd);border-radius:var(--r);padding:5px 12px;cursor:pointer;font-size:12px;color:var(--txt2)}
.wish-period-nav button:active{background:var(--bg3)}
.template-bar{display:flex;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--bd);background:var(--bg2);overflow-x:auto;flex-shrink:0}
.template-bar::-webkit-scrollbar{display:none}
.tmpl-label{font-size:11px;color:var(--txt2);white-space:nowrap;flex-shrink:0}
.tmpl-chip{display:flex;align-items:center;gap:2px;padding:3px 4px 3px 10px;border:1px solid var(--bd2);border-radius:20px;font-size:11px;background:var(--bg);color:var(--txt);white-space:nowrap;flex-shrink:0}
.tmpl-chip-del{background:none;border:none;cursor:pointer;font-size:11px;color:var(--txt2);padding:0 3px;line-height:1}
.tmpl-chip-del:active{color:var(--red)}
.tmpl-add-btn{padding:3px 10px;border:1px dashed var(--bd2);border-radius:20px;font-size:11px;cursor:pointer;background:transparent;color:var(--txt2);white-space:nowrap;flex-shrink:0}
.tmpl-add-btn:active{background:var(--bg3)}
.tmpl-none{font-size:11px;color:var(--txt2);white-space:nowrap}
.wish-body{flex:1;overflow:auto;padding:10px 14px 12px}
.wish-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.wish-card{border:1px solid var(--bd);border-radius:var(--r);padding:8px 6px;text-align:center;background:var(--bg)}
.wish-card.has-shift{border-color:#85B7EB;background:#E6F1FB}
.wish-card.is-off{background:var(--bg2)}
.wish-card.has-err{border-color:var(--red);background:#FCEBEB}
.wish-card.is-hol{background:rgba(226,75,74,.05);border-color:rgba(226,75,74,.25)}
.wish-card.has-shift.is-hol{background:#E6F1FB;border-color:#85B7EB}
.wish-date{font-size:14px;font-weight:600;margin-bottom:1px}
.wish-dow{font-size:10px;color:var(--txt2);margin-bottom:2px}
.wish-hname{font-size:9px;color:var(--red);margin-bottom:4px;line-height:1.2}
.wish-inputs{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.wish-input-row{display:flex;align-items:center;gap:4px;justify-content:center}
.wish-input-row label{font-size:10px;color:var(--txt2);width:16px;text-align:right}
.wish-input-row input{width:54px;border:1px solid var(--bd2);border-radius:5px;padding:4px 3px;font-size:12px;text-align:center;color:var(--txt);background:var(--bg)}
.wish-input-row input.err{border-color:var(--red);background:#FCEBEB}
.wish-err-msg{font-size:9px;color:var(--red);line-height:1.3;min-height:10px;margin-bottom:2px}
.card-tmpl-row{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-bottom:3px}
.card-tmpl-btn{padding:2px 6px;border:1px solid var(--bd2);border-radius:10px;font-size:9px;cursor:pointer;background:var(--bg2);color:var(--txt);white-space:nowrap}
.card-tmpl-btn:active{background:#B5D4F4;border-color:var(--blue);color:var(--blue)}
.wish-del-btn{font-size:10px;color:var(--red);cursor:pointer;border:none;background:none;text-decoration:underline;padding:2px}
.wish-footer{padding:11px 14px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg)}
.wish-save-btn{background:var(--txt);color:var(--bg);border:none;border-radius:var(--r);padding:10px 24px;font-size:14px;cursor:pointer;font-weight:600}
.wish-save-btn:active{opacity:.8}
.wish-footer-err{font-size:11px;color:var(--red)}

}

// ===== 休憩ロジック =====
// 勤務時間（分）から休憩時間（分）を返す
// 社会保険加入者の月合計実働時間を計算
// 指定日のシフトをnewShiftに変えた場合の月合計を返す
function calcMonthlyHours(staffName, targetD, newShift){
  var total=0;
  // 前半・後半両方の全日を確認
  for(var h2=0;h2<=1;h2++){
    var daysInHalf=h2===0?
      Array.from({length:15},function(_,i){return i+1;}):
      (function(){var arr=[];var last=new Date(year,month+1,0).getDate();for(var d=16;d<=last;d++)arr.push(d);return arr;})();
    daysInHalf.forEach(function(d){
      // targetDのシフトはnewShiftを使う
      var sh;
      if(d===targetD){
        sh=newShift;
      } else {
        // periodDataから取得
        var pKey=year+"-"+month+"-"+h2;
        var pShift=null;
        if(h2===half){
          // 現在の期間
          pShift=shiftData[key(staffName,d)]||wishData[key(staffName,d)]||null;
        } else if(periodData[pKey]){
          pShift=periodData[pKey].shiftData[key(staffName,d)]||periodData[pKey].wishData[key(staffName,d)]||null;
        }
        sh=pShift;
      }
      if(sh&&sh!=="off")total+=calcRawH(sh);
    });
  }
  return total;
}

function getBreakMinutes(workH){
  // breakRulesを降順（大きい閾値から）チェック
  var rules=breakRules.slice().sort(function(a,b){return b.threshH-a.threshH;});
  for(var i=0;i<rules.length;i++){
    if(workH>rules[i].threshH)return rules[i].breakMin;
  }
  return 0;
}

// シフト文字列から勤務時間（h）を計算（休憩なし）
function calcRawH(shift){
  if(!shift)return 0;
  var p=shift.split("-");if(p.length<2)return 0;
  var a=parseInt(p[0]),b=parseInt(p[1]);if(!a||!b)return 0;
  return Math.max(0,(Math.floor(b/100)+b%100/60)-(Math.floor(a/100)+a%100/60));
}

// 日付dの全スタッフの休憩情報をキャッシュ
// {staffName: {start: 930, end: 1000}} (休憩なしはnull)
var breakCache={};  // キー: "year-month-d"
var breakOverrides={};  // 手動休憩設定 キー: "name-year-month-d"

function computeBreaks(d){
  var cacheKey=year+"-"+month+"-"+d;
  if(breakCache[cacheKey])return breakCache[cacheKey];

  var result={};

  // 全スタッフのシフトを収集し、出勤時間順にソート
  var staffShifts=[];
  groups.forEach(function(g){
    g.staff.forEach(function(s){
      var sh=gConf(s.name,d)||gDisp(s.name,d);
      if(!sh||sh==="off")return;
      var overKey=s.name+"-"+year+"-"+month+"-"+d;
      // 手動override済みのスタッフはスキップ（後で設定）
      if(breakOverrides[overKey]!==undefined){return;}
      var p=sh.split("-");
      var inn=parseInt(p[0]),out=parseInt(p[1]);
      var workH=calcRawH(sh);
      var breakMin=getBreakMinutes(workH);
      if(breakMin===0){result[s.name]=null;return;}
      staffShifts.push({name:s.name,inn:inn,out:out,breakMin:breakMin});
    });
  });

  // 出勤時間順にソート（同じ場合はグループ・スタッフ順）
  staffShifts.sort(function(a,b){
    if(a.inn!==b.inn)return a.inn-b.inn;
    var ai=-1,bi=-1,idx=0;
    groups.forEach(function(g){g.staff.forEach(function(s){
      if(s.name===a.name)ai=idx;
      if(s.name===b.name)bi=idx;
      idx++;
    });});
    return ai-bi;
  });

  // 使用済み休憩区間（手動設定済みのものを先に登録）
  var usedIntervals=[];
  groups.forEach(function(g){g.staff.forEach(function(s){
    var overKey=s.name+"-"+year+"-"+month+"-"+d;
    var ov=breakOverrides[overKey];
    if(ov!==undefined){
      result[s.name]=ov;
      if(ov){
        var ovSH=Math.floor(ov.start/100)+ov.start%100/60;
        var ovEH=Math.floor(ov.end/100)+ov.end%100/60;
        usedIntervals.push({sH:ovSH,eH:ovEH});
      }
    }
  });});

  // 自動計算
  staffShifts.forEach(function(st){
    var inn=st.inn,out=st.out,breakMin=st.breakMin;
    var innH=Math.floor(inn/100)+inn%100/60;
    var outH=Math.floor(out/100)+out%100/60;
    var breakH=breakMin/60;

    function tryRange(minS,maxS){
      var t=Math.ceil(minS*2)/2;
      while(t<=maxS){
        var hh=Math.floor(t),mm=Math.round((t-hh)*60);
        if(mm===0||mm===30){
          var csH=t,ceH=t+breakH;
          // 1分も重ならないチェック
          var overlap=false;
          for(var ii=0;ii<usedIntervals.length;ii++){
            var ui=usedIntervals[ii];
            if(csH<ui.eH-0.001&&ceH>ui.sH+0.001){overlap=true;break;}
          }
          if(!overlap){
            usedIntervals.push({sH:csH,eH:ceH});
            var bsH2=Math.floor(t),bsM2=Math.round((t-bsH2)*60);
            var bsInt=bsH2*100+bsM2;
            var beT=t+breakH;
            var beH2=Math.floor(beT),beM2=Math.round((beT-beH2)*60);
            var beInt=beH2*100+beM2;
            result[st.name]={start:bsInt,end:beInt,min:breakMin};
            return true;
          }
        }
        t+=0.5;
      }
      return false;
    }

    var minS3=innH+breakMargin1,maxS3=outH-breakMargin1-breakH;
    var minS2=innH+breakMargin2,maxS2=outH-breakMargin2-breakH;
    if(!tryRange(minS3,maxS3)){
      if(!tryRange(minS2,maxS2)){
        result[st.name]=null; // 条件を満たせない
      }
    }
  });

  // 休憩なしスタッフのnullも設定
  groups.forEach(function(g){g.staff.forEach(function(s){
    if(result[s.name]===undefined)result[s.name]=null;
  });});

  breakCache[cacheKey]=result;
  return result;
}

function autoRecalcBreak(){
  if(!dailyEditTarget)return;
  var ivEl=document.getElementById("de-in");
  var ovEl=document.getElementById("de-out");
  var brAuto=document.getElementById("de-break-auto");
  var bsInp=document.getElementById("de-break-start");
  var beInp=document.getElementById("de-break-end");
  if(!ivEl||!ovEl||!bsInp||!beInp)return;
  var iv=ivEl.value.replace(":","").trim();
  var ov=ovEl.value.replace(":","").trim();
  if(iv.length<3||ov.length<3)return;
  var inn=parseInt(iv),out=parseInt(ov);
  if(isNaN(inn)||isNaN(out)||out<=inn)return;
  // 手動override済みの場合は再計算しない
  var overKey=dailyEditTarget.name+"-"+year+"-"+month+"-"+dailyEditTarget.d;
  if(breakOverrides[overKey]!==undefined)return;
  // 仮シフトで休憩を計算
  var innH=Math.floor(inn/100)+inn%100/60;
  var outH=Math.floor(out/100)+out%100/60;
  var workH=outH-innH;
  var breakMin=getBreakMinutes(workH);
  if(breakMin===0){
    if(brAuto)brAuto.textContent="休憩なし（6時間以下）";
    bsInp.value="";beInp.value="";
    return;
  }
  var breakH=breakMin/60;
  // 休憩候補を計算（他スタッフのusedIntervalsは考慮せず、時間帯のみ計算）
  var minS=innH+breakMargin1,maxS=outH-breakMargin1-breakH;
  if(minS>maxS){minS=innH+breakMargin2;maxS=outH-breakMargin2-breakH;}
  if(minS>maxS){
    if(brAuto)brAuto.textContent="⚠ 自動配置できません";
    return;
  }
  // :00/:30の候補から最初のものを採用
  var t=Math.ceil(minS*2)/2;
  var found=false;
  while(t<=maxS){
    var hh=Math.floor(t),mm=Math.round((t-hh)*60);
    if(mm===0||mm===30){
      var bsH=hh*100+mm;
      var beT=t+breakH;
      var beHH=Math.floor(beT),beMM=Math.round((beT-beHH)*60);
      var beH=beHH*100+beMM;
      bsInp.value=String(bsH);
      beInp.value=String(beH);
      if(brAuto)brAuto.textContent="自動計算: "+fT(bsH)+"〜"+fT(beH)+" ("+breakMin+"分)";
      found=true;
      break;
    }
    t+=0.5;
  }
  if(!found&&brAuto)brAuto.textContent="⚠ 自動配置できません（手動で設定してください）";
}
function autoAdjustOverstaffed(d){
  d=parseInt(d);
  var adjusted=false;
  var MAX_ITER=200;

  function roundToHalf(hFloat){
    var rounded=Math.round(hFloat*2)/2;
    var hh=Math.floor(rounded);
    var mm=Math.round((rounded-hh)*60);
    return hh*100+mm;
  }

  // ★ isPresentNetベースで在籍判定（グラフと同じ基準）
  // excludeNameのスタッフはoverrideShを使う
  function countAt(h, excludeName, overrideSh){
    var c=0;
    groups.forEach(function(g){g.staff.forEach(function(s){
      var sh=(s.name===excludeName)?overrideSh:(gConf(s.name,d)||null);
      if(isPresentNet(sh,h,s.name,d))c++;
    });});
    return c;
  }

  // ただしoverrideShを使う場合は休憩を再計算できないため
  // overrideSh指定時はシンプルな時間帯チェックを使う
  function countAtSimple(h, excludeName, overrideSh){
    var c=0;
    groups.forEach(function(g){g.staff.forEach(function(s){
      var sh;
      if(s.name===excludeName){
        sh=overrideSh;
        // シンプルチェック
        if(!sh||sh==="off")return;
        var p=sh.split("-"),inn=parseInt(p[0]),out=parseInt(p[1]);
        if(decH(inn)<=h&&decH(out)>h)c++;
        return;
      } else {
        sh=gConf(s.name,d)||null;
        if(isPresentNet(sh,h,s.name,d))c++;
      }
    });});
    return c;
  }

  // 調整開始前の不足時間帯を記録（isPresentNetベース）
  clearBreakCache();
  var origShortage={};
  for(var h=OPEN;h<CLOSE;h++){
    var req0=getReq(d,h);if(req0<=0)continue;
    if(countAt(h,null,null)<req0)origShortage[h]=1;
  }

  for(var iter=0;iter<MAX_ITER;iter++){
    clearBreakCache();
    // ★ 毎イテレーション現在の不足時間帯を更新（調整が進むにつれて変わるため）
    var curShortage={};
    for(var h=OPEN;h<CLOSE;h++){
      var req0b=getReq(d,h);if(req0b<=0)continue;
      if(countAt(h,null,null)<req0b)curShortage[h]=1;
    }

    // 現在の過多時間帯（isPresentNetベース）
    var overHours=[];
    for(var h=OPEN;h<CLOSE;h++){
      var req=getReq(d,h);if(req<=0)continue;
      var cnt=countAt(h,null,null);
      if(cnt>req)overHours.push({h:h,cnt:cnt,req:req,over:cnt-req});
    }
    if(overHours.length===0)break;
    overHours.sort(function(a,b){return b.over-a.over;});
    var targetH=overHours[0].h;

    // targetHに在籍している候補（isPresentNetで判定・社員は除外）
    var candidates=[];
    groups.forEach(function(g){
      if(g.label==="社員")return; // 社員は調整対象外
      g.staff.forEach(function(s){
      var sh=gConf(s.name,d)||null;
      if(!sh||sh==="off")return;
      if(!isPresentNet(sh,targetH,s.name,d))return;
      var wishH=calcRawH(wishData[key(s.name,d)]||null)||0;
      var confH=calcRawH(sh)||0;
      candidates.push({name:s.name,sh:sh,wishH:wishH,confH:confH,reduced:wishH-confH});
    });});
    if(candidates.length===0)break;

    if(adjPriority==="short-off"){
      candidates.sort(function(a,b){return a.confH-b.confH;});
    } else {
      candidates.sort(function(a,b){return b.reduced-a.reduced;});
    }

    var doneSomething=false;
    for(var ci=0;ci<candidates.length;ci++){
      var target=candidates[ci];
      var p=target.sh.split("-");
      var inn=parseInt(p[0]),out=parseInt(p[1]);
      var innH=Math.floor(inn/100)+inn%100/60;
      var outH=Math.floor(out/100)+out%100/60;

      // 0.5h刻みで全パターンを生成
      var plans=[];
      if(adjPriority==="short-off"){
        plans.push("off");
      }
      // 出勤を遅らせる（3h以上残る範囲）
      var t=innH+0.5;
      while(t<=outH-3){
        plans.push(roundToHalf(t)+"-"+out);
        t+=0.5;
      }
      // 退勤を早める（3h以上残る範囲）
      var t2=outH-0.5;
      while(t2>=innH+3){
        plans.push(inn+"-"+roundToHalf(t2));
        t2-=0.5;
      }
      if(adjPriority!=="short-off"){
        plans.push("off");
      }

      var chosenSh=null;
      for(var pi=0;pi<plans.length;pi++){
        var newSh=plans[pi];

        // ① 少なくとも1つの過多時間帯の人数を減らすか（シンプルチェック）
        var reducesOver=false;
        for(var oi=0;oi<overHours.length;oi++){
          var oh=overHours[oi].h;
          var wasIn=isPresentNet(target.sh,oh,target.name,d);
          var willIn=(newSh==="off")?false:(function(){
            if(!newSh)return false;
            var pp=newSh.split("-"),a=parseInt(pp[0]),b=parseInt(pp[1]);
            return decH(a)<=oh&&decH(b)>oh;
          })();
          if(wasIn&&!willIn){reducesOver=true;break;}
        }
        if(!reducesOver)continue;

        // ② 変更後に充足だった時間帯が不足にならないか（countAtSimpleで仮適用）
        var causesNewShortage=false;
        for(var hc=OPEN;hc<CLOSE;hc++){
          // origShortage(最初から不足)もcurShortage(現在不足)もスキップ
          if(origShortage[hc]||curShortage[hc])continue;
          var reqC=getReq(d,hc);if(reqC<=0)continue;
          var cntC=countAtSimple(hc,target.name,newSh);
          if(cntC<reqC){causesNewShortage=true;break;}
        }
        if(causesNewShortage)continue;

        // ③ 社保チェック
        if(isShInsured(target.name)){
          if(calcMonthlyHours(target.name,d,newSh)<120)continue;
        }

        chosenSh=newSh;break;
      }

      if(chosenSh!==null){
        shiftData[key(target.name,d)]=chosenSh;
        confirmedShiftData[key(target.name,d)]=chosenSh;
        doneSomething=true;adjusted=true;
        break;
      }
    }
    if(!doneSomething)break;
  }

  if(adjusted){
    clearBreakCache();
    document.getElementById("panel-daily").innerHTML=buildDailyView(d);
    var ps=document.getElementById("panel-shift");
    if(ps&&ps.innerHTML)ps.innerHTML=buildShift();
    // 残った過多・不足を確認
    clearBreakCache();
    var remaining=[];
    for(var hr=OPEN;hr<CLOSE;hr++){
      var reqR=getReq(d,hr);if(reqR<=0)continue;
      var cntR=0;
      groups.forEach(function(g2){g2.staff.forEach(function(s2){if(isPresentNet(gConf(s2.name,d)||null,hr,s2.name,d))cntR++;});});
      if(cntR>reqR)remaining.push(hr+"〜"+(hr+1)+"時 過多+"+(cntR-reqR));
    }
    if(remaining.length===0){
      showToast("シフト過多を自動調整しました ✓");
    } else {
      showToast("調整完了（残: "+remaining.join("・")+"は制約上解消できません）",4000);
    }
  } else {
    showToast("調整の必要はありません（または調整できません）");
  }
}

function clearBreakCache(){breakCache={};}

function clearBreakOverride(){
  var ia=document.getElementById("pc-inp-a"),ib=document.getElementById("pc-inp-b");
  var brAuto=document.getElementById("de-break-auto");
  var bsInp=document.getElementById("de-break-start");
  var beInp=document.getElementById("de-break-end");
  if(bsInp)bsInp.value="";if(beInp)beInp.value="";
  if(dailyEditTarget&&brAuto){
    clearBreakCache();
    var br0=computeBreaks(dailyEditTarget.d);
    var bi0=br0?br0[dailyEditTarget.name]:null;
    if(bi0){
      if(bsInp)bsInp.value=String(bi0.start);
      if(beInp)beInp.value=String(bi0.end);
      brAuto.textContent="自動計算: "+fT(bi0.start)+"〜"+fT(bi0.end)+" ("+bi0.min+"分)";
    } else {
      brAuto.textContent="自動計算: 休憩なし";
    }
    var overKey3=dailyEditTarget.name+"-"+year+"-"+month+"-"+dailyEditTarget.d;
    delete breakOverrides[overKey3];
  }
}

// スタッフが特定の時間帯(hour)に在籍しているか（休憩中はfalse）
function isPresentNet(shift,hour,staffName,d){
  if(!shift||shift==="off")return false;
  var p=shift.split("-");if(p.length<2)return false;
  var inn=parseInt(p[0]),out=parseInt(p[1]);
  // 基本的な在籍チェック
  if(!(decH(inn)<(hour+1)&&decH(out)>hour))return false;
  // 休憩チェック
  var br=computeBreaks(d);
  var breakInfo=br?br[staffName]:null;
  if(breakInfo){
    var bsH=Math.floor(breakInfo.start/100)+breakInfo.start%100/60;
    var beH=Math.floor(breakInfo.end/100)+breakInfo.end%100/60;
    // スロット[hour, hour+1]と休憩[bsH, beH]の重複時間
    var overlapStart=Math.max(bsH, hour);
    var overlapEnd=Math.min(beH, hour+1);
    // 少しでも重複があれば在籍なし（休憩中）
    if(overlapEnd>overlapStart+0.001)return false;
  }
  return true;
}

function calcH(e){if(!e)return 0;var p=e.split("-");if(p.length<2)return 0;var a=parseInt(p[0]),b=parseInt(p[1]);if(!a||!b)return 0;return Math.max(0,(Math.floor(b/100)+b%100/60)-(Math.floor(a/100)+a%100/60));}

function calcNetH(shift,staffName,d){
  if(!shift||shift==="off")return 0;
  var rawH=calcRawH(shift);
  var br=computeBreaks(d);
  var breakInfo=br?br[staffName]:null;
  if(breakInfo)rawH-=breakInfo.min/60;
  return Math.max(0,rawH);
}
function fT(n){if(!n&&n!==0)return"--";var s=String(n).padStart(4,"0");return s.slice(0,2)+":"+s.slice(2);}
function decH(n){return Math.floor(n/100)+n%100/60;}
function bw(e){if(!e)return{l:0,w:0};var p=e.split("-"),a=parseInt(p[0]),b=parseInt(p[1]);if(!a||!b)return{l:0,w:0};var sp=CLOSE-OPEN,l=Math.max(0,(decH(a)-OPEN)/sp*100),w=Math.min(100,(decH(b)-OPEN)/sp*100)-l;return{l:Math.round(l),w:Math.max(4,Math.round(w))};}
function isPresent(shift,hour){if(!shift)return false;var p=shift.split("-");if(p.length<2)return false;var inn=parseInt(p[0]),out=parseInt(p[1]);if(!inn||!out)return false;return decH(inn)<(hour+1)&&decH(out)>hour;}
function calcHeadcounts(d){var hours=[];for(var h=OPEN;h<CLOSE;h++){var all=0,hk=0;groups.forEach(function(g){g.staff.forEach(function(s){var shift=gConf(s.name,d)||gDisp(s.name,d);if(isPresentNet(shift,h,s.name,d)){all++;if(g.label===HK_LABEL)hk++;}});});hours.push({h:h,all:all,hk:hk});}return hours;}
function calcDayTotalH(d){var tot=0;groups.forEach(function(g){g.staff.forEach(function(s){var sh=gDisp(s.name,d);tot+=calcNetH(sh,s.name,d);});});return Math.round(tot*10)/10;}
function getShortageHours(d){var arr=[];for(var h=OPEN;h<CLOSE;h++){var all=0;groups.forEach(function(g){g.staff.forEach(function(s){var _sh=gConf(s.name,d)||gDisp(s.name,d);if(isPresentNet(_sh,h,s.name,d))all++;});});if(getReq(d,h)>0&&all<getReq(d,h))arr.push({h:h,diff:all-getReq(d,h)});}return arr;}
function getDaysWithShortage(){return getDays().filter(function(x){return getShortageHours(x.d).length>0;});}

// スプレッドシートからデータを読み込む
function gasLoad(callback){
  if(!GAS_URL){if(callback)callback(false,"URL未設定");return;}
  syncStatus="同期中";updateSyncIndicator();
  fetch(GAS_URL)
    .then(function(r){return r.json();})
    .then(function(res){
      if(res.status==="ok"&&res.data){
        var d=res.data;
        if(d.groups)groups=d.groups;
        if(d.adminPin)adminPin=d.adminPin;
        if(d.periodData)periodData=d.periodData;
        if(d.reqData)reqData=d.reqData;
        if(d.breakRules)breakRules=d.breakRules;
        if(d.breakMargin1!==undefined)breakMargin1=d.breakMargin1;
        if(d.breakMargin2!==undefined)breakMargin2=d.breakMargin2;
        if(d.adjPriority)adjPriority=d.adjPriority;
        // 現在の期間データを復元
        var curKey=year+"-"+month+"-"+half;
        if(periodData[curKey]){
          shiftData=JSON.parse(JSON.stringify(periodData[curKey].shiftData||{}));
          wishData=JSON.parse(JSON.stringify(periodData[curKey].wishData||{}));
          confirmedShiftData=JSON.parse(JSON.stringify(periodData[curKey].confirmedShiftData||{}));
          shiftConfirmed=periodData[curKey].shiftConfirmed||false;
        }
        clearBreakCache();
        syncStatus="同期済";
        lastSyncTime=new Date();
        updateSyncIndicator();
        if(callback)callback(true);
      } else {
        syncStatus="エラー";updateSyncIndicator();
        if(callback)callback(false,res.message||"読み込みエラー");
      }
    })
    .catch(function(e){
      syncStatus="エラー";updateSyncIndicator();
      if(callback)callback(false,e.message);
    });
}

// スプレッドシートにデータを保存する
function gasSave(extraData){
  if(!GAS_URL)return;
  // 現在の期間データをperiodDataに保存
  var curKey=year+"-"+month+"-"+half;
  periodData[curKey]={
    shiftData:JSON.parse(JSON.stringify(shiftData)),
    wishData:JSON.parse(JSON.stringify(wishData)),
    confirmedShiftData:JSON.parse(JSON.stringify(confirmedShiftData)),
    shiftConfirmed:shiftConfirmed
  };
  var saveData={
    groups:groups,
    adminPin:adminPin,
    periodData:periodData,
    reqData:reqData,
    breakRules:breakRules,
    breakMargin1:breakMargin1,
    breakMargin2:breakMargin2,
    adjPriority:adjPriority
  };
  if(extraData)Object.keys(extraData).forEach(function(k){saveData[k]=extraData[k];});
  syncStatus="同期中";updateSyncIndicator();
  fetch(GAS_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({data:saveData})
  })
    .then(function(r){return r.json();})
    .then(function(res){
      if(res.status==="ok"){
        syncStatus="同期済";lastSyncTime=new Date();
      } else {
        syncStatus="エラー";
      }
      updateSyncIndicator();
    })
    .catch(function(){syncStatus="エラー";updateSyncIndicator();});
}

// 同期インジケーターを更新
function updateSyncIndicator(){
  var el=document.getElementById("sync-indicator");
  if(!el)return;
  var color=syncStatus==="同期済"?"#22c55e":syncStatus==="同期中"?"#f59e0b":syncStatus==="エラー"?"#ef4444":"#94a3b8";
  var label=syncStatus==="同期済"&&lastSyncTime?
    "同期済 "+lastSyncTime.getHours()+":"+String(lastSyncTime.getMinutes()).padStart(2,"0"):
    syncStatus;
  el.innerHTML="<span style=\"width:8px;height:8px;border-radius:50%;background:"+color+";display:inline-block;margin-right:4px\"></span>"+label;
}

  var current=GAS_URL||"";

function addBreakRule(){
  breakRules.push({threshH:breakRules.length+6,breakMin:30});
  document.getElementById("panel-breaksetting").innerHTML=buildBreakSetting();
}

function removeBreakRule(i){
  if(breakRules.length<=1){showToast("ルールは最低1つ必要です");return;}
  breakRules.splice(i,1);
  document.getElementById("panel-breaksetting").innerHTML=buildBreakSetting();
}

function saveBreakSetting(){
  var errEl=document.getElementById("break-setting-err");
  // ルール読み取り
  var newRules=[];
  for(var i=0;i<breakRules.length;i++){
    var th=parseFloat(document.getElementById("brule-thresh-"+i).value);
    var mn=parseInt(document.getElementById("brule-min-"+i).value);
    if(isNaN(th)||isNaN(mn)||th<0||mn<0){
      if(errEl)errEl.textContent="不正な値があります";return;
    }
    newRules.push({threshH:th,breakMin:mn});
  }
  // 重複チェック
  var threshSet={};
  for(var j=0;j<newRules.length;j++){
    if(threshSet[newRules[j].threshH]){if(errEl)errEl.textContent="同じ閾値が重複しています";return;}
    threshSet[newRules[j].threshH]=1;
  }
  // 余白読み取り
  var m1=parseFloat(document.getElementById("bmargin1").value);
  var m2=parseFloat(document.getElementById("bmargin2").value);
  if(isNaN(m1)||isNaN(m2)||m1<0||m2<0){if(errEl)errEl.textContent="余白の値が不正です";return;}
  if(m2>=m1){if(errEl)errEl.textContent="第2優先の余白は第1優先より小さくしてください";return;}
  // 保存
  breakRules=newRules;
  breakMargin1=m1;
  breakMargin2=m2;
  clearBreakCache();
  if(errEl)errEl.textContent="";
  document.getElementById("panel-breaksetting").innerHTML=buildBreakSetting();
  showToast("休憩設定を保存しました");gasSave();
}

function saveWorkHours(){
  var s=parseInt(document.getElementById("work-start").value);
  var e=parseInt(document.getElementById("work-end").value);
  if(isNaN(s)||isNaN(e)||s<0||s>23||e<1||e>24){showToast("時間の値が不正です");return;}
  if(s>=e){showToast("終了時間は開始時間より後にしてください");return;}
  workStart=s;workEnd=e;
  // OPEN/CLOSEも連動して更新（グラフ・デイリー用）
  OPEN=s;CLOSE=e;
  // 必要人数データを新しい時間帯に合わせてリセット確認
  showToast("勤務可能時間を "+s+":00〜"+e+":00 に設定しました");gasSave();
}

function quickJoinShift(d,h){
  if(!currentStaff)return;
  var k=key(currentStaff.name,d);
  var existing=confirmedShiftData[k]||shiftData[k]||null;
  var newIn,newOut;
  // 不足時間帯の開始〜終了をベースにシフトを設定
  if(existing&&existing!=="off"){
    var ep=existing.split("-");
    newIn=Math.min(parseInt(ep[0]),h*100);
    newOut=Math.max(parseInt(ep[1]),(h+1)*100);
    if(newIn===parseInt(ep[0])&&newOut===parseInt(ep[1])){
      showToast("既存シフト内の時間帯です");return;
    }
  } else {
    newIn=h*100;
    newOut=(h+1)*100;
  }
  shiftData[k]=newIn+"-"+newOut;
  confirmedShiftData[k]=newIn+"-"+newOut;
  clearBreakCache();
  var panel=document.getElementById("panel-staff-confirmed");
  if(panel&&panel.classList.contains("active"))panel.innerHTML=buildStaffConfirmed();
  showToast(fT(newIn)+"〜"+fT(newOut)+" でシフトに入りました");
}
function openSsShift(d){ssTargetD=d;var sh=getShortageHours(d);var hn=hol(year,month+1,d);var dow=new Date(year,month,d).getDay();document.getElementById("ss-title").textContent=(month+1)+"月"+d+"日（"+DOW[dow]+"）"+(hn?"・"+hn:"");
  var existShift=currentStaff?(confirmedShiftData[key(currentStaff.name,d)]||null):null;
  var existMsg=existShift&&existShift!=="off"?"　現在のシフト："+fT(parseInt(existShift.split("-")[0]))+"〜"+fT(parseInt(existShift.split("-")[1])):"";
  document.getElementById("ss-sub").textContent="不足時間帯："+sh.map(function(x){return x.h+"時台";}).join("・")+existMsg;document.getElementById("ss-in").value="";document.getElementById("ss-out").value="";clearSsErr();document.getElementById("ss-shift-overlay").classList.add("open");}
function closeSsShift(){document.getElementById("ss-shift-overlay").classList.remove("open");ssTargetD=null;}
function clearSsErr(){["ss-in","ss-out"].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.remove("err");});["ss-in-err","ss-out-err"].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent="";});var e=document.getElementById("ss-global-err");if(e){e.textContent="";e.style.display="none";}}
function saveSsShift(){if(ssTargetD===null||!currentStaff)return;var d=ssTargetD;var iv=document.getElementById("ss-in").value.trim(),ov=document.getElementById("ss-out").value.trim();var r=vPair(iv,ov);if(!r.ok){if(r.field==="in"){document.getElementById("ss-in").classList.add("err");document.getElementById("ss-in-err").textContent=r.msg;}else if(r.field==="out"){document.getElementById("ss-out").classList.add("err");document.getElementById("ss-out-err").textContent=r.msg;}else{var el=document.getElementById("ss-global-err");el.textContent=r.msg;el.style.display="block";}return;}// 入力シフトが不足時間帯をカバーしているか確認
  var sh2=getShortageHours(d);
  if(sh2.length>0){
    var covers=sh2.some(function(s){
      var sH=s.h,eH=s.h+1;
      var inH=Math.floor(r.inVal/100)+r.inVal%100/60;
      var outH=Math.floor(r.outVal/100)+r.outVal%100/60;
      return inH<=sH&&outH>=eH;
    });
    if(!covers){
      var el2=document.getElementById("ss-global-err");
      if(el2){el2.textContent="不足時間帯（"+sh2.map(function(s){return s.h+"〜"+(s.h+1)+"時";}).join("・")+"）をカバーする時間で入力してください";el2.style.display="block";}
      return;
    }
  }
  var k=key(currentStaff.name,d);
  // 既存シフトとマージ（早い出勤〜遅い退勤）
  var existing=confirmedShiftData[k]||shiftData[k]||null;
  var finalIn=r.inVal,finalOut=r.outVal;
  var mergeMsg="";
  if(existing&&existing!=="off"){
    var ep=existing.split("-");
    var exIn=parseInt(ep[0]),exOut=parseInt(ep[1]);
    var newIn=Math.min(exIn,r.inVal),newOut=Math.max(exOut,r.outVal);
    if(newIn===exIn&&newOut===exOut){
      // 既存シフトの範囲内なので変更なし
      closeSsShift();
      showToast("入力時間は既存シフト（"+fT(exIn)+"〜"+fT(exOut)+"）の範囲内です");
      return;
    }
    finalIn=newIn;finalOut=newOut;
    mergeMsg=fT(newIn)+"〜"+fT(newOut);
  } else {
    mergeMsg=fT(finalIn)+"〜"+fT(finalOut);
  }
  shiftData[k]=finalIn+"-"+finalOut;
  confirmedShiftData[k]=finalIn+"-"+finalOut;
  clearBreakCache();
  closeSsShift();
  var panel=document.getElementById("panel-staff-confirmed");
  if(panel&&panel.classList.contains("active"))panel.innerHTML=buildStaffConfirmed();
  showToast(mergeMsg+" にシフトが更新されました");gasSave();}

function chgPeriod(delta){
  // 現在の期間データを保存
  var oldKey=year+"-"+month+"-"+half;
  periodData[oldKey]={
    shiftData:JSON.parse(JSON.stringify(shiftData)),
    wishData:JSON.parse(JSON.stringify(wishData)),
    confirmedShiftData:JSON.parse(JSON.stringify(confirmedShiftData)),
    shiftConfirmed:shiftConfirmed
  };
  // 期間を変更
  half+=delta;
  if(half>1){half=0;month++;}
  if(half<0){half=1;month--;}
  if(month>11){month=0;year++;}
  if(month<0){month=11;year--;}
  // 新期間のデータを復元（なければ空）
  var newKey=year+"-"+month+"-"+half;
  if(periodData[newKey]){
    shiftData=JSON.parse(JSON.stringify(periodData[newKey].shiftData));
    wishData=JSON.parse(JSON.stringify(periodData[newKey].wishData));
    confirmedShiftData=JSON.parse(JSON.stringify(periodData[newKey].confirmedShiftData));
    shiftConfirmed=periodData[newKey].shiftConfirmed;
  } else {
    shiftData={};wishData={};confirmedShiftData={};shiftConfirmed=false;
  }
  clearBreakCache();
  gasSave();
  render();
}
function hasUnsavedWish(){
  // シフト確定済みは変更不可なので未保存なし
  if(shiftConfirmed)return false;
  var days=getDays();
  var changed=false;
  days.forEach(function(x){
    var iEl=document.getElementById("win-"+x.d);
    var oEl=document.getElementById("wout-"+x.d);
    if(!iEl||!oEl)return;
    var iv=iEl.value.trim(),ov=oEl.value.trim();
    var saved=wishData[key(currentStaff.name,x.d)]||null;
    // 入力あり→保存なし or 保存値と異なる
    if(iv||ov){
      if(!saved){changed=true;return;}
      var sp=saved.split("-");
      var savIn=(sp[0]||"").replace(":","");
      var savOut=(sp[1]||"").replace(":","");
      if(iv.replace(":","")!==savIn||ov.replace(":","")!==savOut){changed=true;return;}
    } else {
      // 入力なし→保存あり（削除されている）
      if(saved){changed=true;return;}
    }
  });
  return changed;
}

      if(r.h===0&&r.hw===0)return;
      var diffColor=r.diff>0?"var(--blue)":r.diff<0?"var(--red)":"var(--txt2)";
      var diffStr=r.diff===0?"±0h":(r.diff>0?"+":"")+r.diff+"h";
      // 社保加入者で120h未満の場合は警告色
      var nameStyle="";
      if(r.shIns&&r.h<120)nameStyle=' style="color:var(--red)"';
      var insTag=r.shIns?'<span style="font-size:9px;background:#2563EB;color:#fff;border-radius:3px;padding:1px 4px;margin-left:4px">社保</span>':'';
      html+='<tr>'
        +'<td'+nameStyle+'>'+r.name+insTag+'</td>'
        +'<td class="r" style="color:var(--txt2)">'+(r.wage?r.wage.toLocaleString():"-")+'</td>'
        +'<td class="r" style="color:var(--txt2)">'+r.hw+'h</td>'
        +'<td class="r">'+r.h+'h</td>'
        +'<td class="r" style="color:'+diffColor+';font-weight:600">'+diffStr+'</td>'
        +'<td class="r"><span class="wage-amt">'+(r.wageAmt?"¥"+r.wageAmt.toLocaleString():"-")+'</span></td>'
        +'</tr>';
    });
    html+="</tbody></table>";
  });

  html+="</div>";
  document.getElementById("panel-stats").innerHTML=html;
}
